# Force settings that override the Netlify UI (critical: do NOT publish "dist")
[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  # Skip Essential Next.js plugin — we use static export to /out
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
